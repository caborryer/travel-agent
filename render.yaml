services:
  - type: web
    name: travel-agent-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash render-start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
