services:
  - type: web
    name: travel-agent-api
    runtime: python
    # Option A: set rootDir to backend (preferred)
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    # Option B: if rootDir is repo root, use instead:
    # buildCommand: pip install -r requirements.txt
    # startCommand: bash render-start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
